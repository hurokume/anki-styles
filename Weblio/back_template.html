{{FrontSide}}

<hr class="sep">

<div class="backwrap">

    {{#word_jp}}
    <div class="section">
        <div class="section-title">Meaning</div>
        <div class="row">
            <div class="label">意味</div>
            <div class="value meaning">{{word_jp}}</div>
        </div>
    </div>
    {{/word_jp}}

    {{#example_jp}}
    <div class="section">
        <div class="section-title">Example (JP)</div>
        <div class="value ex ja mark-em">{{example_jp}}</div>
    </div>
    {{/example_jp}}

</div>

<script>
    (function () {
        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function applyStarEmphasis(el) {
            var t = el.textContent || "";
            var safe = escapeHtml(t);

            var out = safe.replace(/\*([^*\n][^*\n]*?)\*/g, function (_, p1) {
                return '<span class="em-red-bold">' + p1 + '</span>';
            });

            out = out.replace(/\*/g, "");
            el.innerHTML = out;
        }

        function normalizePronunciation() {
            var p = document.querySelector(".pron");
            if (p && p.textContent) {
                p.textContent = p.textContent
                    .replace(/'/g, "ˈ")
                    .replace(/,/g, "ˌ");
            }
        }

        function run() {
            var nodes = document.querySelectorAll(".mark-em");
            for (var i = 0; i < nodes.length; i++) {
                applyStarEmphasis(nodes[i]);
            }
            normalizePronunciation();
        }

        setTimeout(run, 50);
    })();
</script>
